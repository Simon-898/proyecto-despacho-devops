name: EP3 CI/CD - Build Push Deploy ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  FRONTEND_SERVICE: ${{ secrets.ECS_FRONTEND_SERVICE }}
  BACKEND_SERVICE: ${{ secrets.ECS_BACKEND_SERVICE }}
  FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
  BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPOSITORY }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir imágenes
        run: |
          echo "FRONTEND_IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${FRONTEND_REPO}:latest" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_REPO}:latest" >> $GITHUB_ENV

      - name: Build Frontend
        run: |
          docker build -t $FRONTEND_IMAGE ./front_despacho

      - name: Build Backend
        run: |
          docker build -t $BACKEND_IMAGE ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push Frontend
        run: |
          docker push $FRONTEND_IMAGE

      - name: Push Backend
        run: |
          docker push $BACKEND_IMAGE

      - name: Redeploy Backend
        run: |
          aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $BACKEND_SERVICE \
          --force-new-deployment

      - name: Redeploy Frontend
        run: |
          aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $FRONTEND_SERVICE \
          --force-new-deployment